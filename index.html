    /* --- Light Mode (Para sa Snow, Sky, Rose, Cream) --- */
    .light-mode { color: #0f172a; }
    .light-mode .glass-card { 
        background: rgba(255, 255, 255, var(--glass-opacity, 0.8)); 
        border: 1px solid rgba(0, 0, 0, 0.05);

    .light-mode .modal-content { background: #ffffff; color: #0f172a; border: 1px solid #e2e8f0; }
    
    /* Auto-fix para sa text na hardcoded na white sa HTML */
    .light-mode .text-white, 
    .light-mode .font-white,
    .light-mode p.text-white { color: #0f172a !important; }
    
    /* Keypad sa Light Mode */
    .light-mode .num-btn { background: rgba(0,0,0,0.06); color: #0f172a; border: 1px solid rgba(0,0,0,0.03); }

    /* --- Dark Mode (Para sa Night, Forest, Ruby, Earth) --- */
    .dark-mode { color: #ffffff; }
    .dark-mode .glass-card { 
        background: rgba(0, 0, 0, var(--glass-opacity, 0.5)) !important; 
        border: 1px solid rgba(255, 255, 255, 0.1); 
    }
    .dark-mode .modal-content { background: #0f172a; color: #ffffff; border: 1px solid #1e293b; }
    .dark-mode .text-emerald-600 { color: #34d399 !important; text-shadow: 0 0 10px rgba(52, 211, 153, 0.3); }
    .dark-mode input { color: white; }
    
    /* Keypad sa Dark Mode */
    .dark-mode .num-btn { background: rgba(255,255,255,0.1); color: #ffffff; border: 1px solid rgba(255,255,255,0.05); }

    /* --- Keypad & Modals --- */
    .num-btn { 
        height: 55px; display: flex; align-items: center; justify-content: center; 
        font-size: 1.25rem; font-weight: 800; border-radius: 1rem; 
        transition: all 0.1s; cursor: pointer; user-select: none; 
        -webkit-tap-highlight-color: transparent; touch-action: manipulation; 
    }
    .num-btn:active, .num-btn.active-key { background: #10b981 !important; color: white !important; transform: scale(0.95); }
    
    .modal { 
        position: fixed; inset: 0; background: rgba(0,0,0,0.85); 
        backdrop-filter: blur(10px); display: flex; align-items: center; 
        justify-content: center; z-index: 9999; padding: 1.5rem; 
    }
    .hidden { display: none !important; }
    .theme-preview { height: 35px; width: 100%; border-radius: 8px; border: 2px solid rgba(255,255,255,0.1); }

const getLocalDate = (d) => { const offset = d.getTimezoneOffset(); const localDate = new Date(d.getTime() - (offset * 60 * 1000)); return localDate.toISOString().split('T')[0]; };

let pressTimer;
let isLongPress = false;

document.addEventListener('keydown', (e) => {
    if(app.state.view !== 'reading') return;
    const key = e.key;
    if(/[0-9]/.test(key)) { handleKey(key); animateKey(key); }
    else if(key === '.') { handleKey('.'); animateKey('.'); }
    else if(key === 'Backspace') { handleKey('⌫'); animateKey('⌫'); }
    else if(key === 'Enter') { window.enterNext(); }
});

function animateKey(k) {
    const btn = Array.from(document.querySelectorAll('.num-btn')).find(b => b.innerText === k);
    if(btn) { btn.classList.add('active-key'); setTimeout(() => btn.classList.remove('active-key'), 100); }
}

class PowerCon {
  constructor() {
    this.state = { view: 'home', currentIndex: 0, date: getLocalDate(new Date()), filterDate: getLocalDate(new Date()), sessionReadings: [], cloudReadings: {}, yesterdayReadings: {}, loading: false, isSingleEdit: false, isEditingFromReview: false};
    this.init();
  }
  async init() { loadSavedTheme(); this.render(); await this.syncWithCloud(); }
  
  async syncWithCloud(targetDate = null) {
    this.state.loading = true; this.render();
    const dateToQuery = targetDate || this.state.date;
    try {
      const snapshot = await db.ref('readings/' + dateToQuery).once('value');
      this.state.cloudReadings = snapshot.val() || {};
      const d = new Date(dateToQuery); d.setDate(d.getDate() - 1);
      const yKey = getLocalDate(d);
      const ySnap = await db.ref('readings/' + yKey).once('value');
      this.state.yesterdayReadings = ySnap.val() || {};
      MOCK_EQUIPMENT.forEach((eq, i) => { if(this.state.cloudReadings[eq.id]) this.state.sessionReadings[i] = this.state.cloudReadings[eq.id]; });
    } catch(e) { console.error(e); }
    this.state.loading = false; this.render();
  }

        <div class="fixed bottom-0 left-0 w-full p-4 bg-transparent backdrop-blur-md flex gap-3">
          <button onclick="app.exportToExcel()" class="flex-1 bg-slate-900 text-white py-4 rounded-xl font-black text-[10px] uppercase">Download CSV</button>
          <button onclick="window.open('logsheet.html?date=' + app.state.filterDate, '_blank')" class="flex-1 bg-emerald-600 text-white py-4 rounded-xl font-black text-[10px] uppercase">Print Log</button>
        </div>
    </div>`;
  }

  async saveReading(currInput, prevInput) {
    const eq = MOCK_EQUIPMENT[this.state.currentIndex];
    
    // Panatilihin bilang string para hindi mawala ang decimal places
    const currentStr = currInput || "0";
    const prevStr = prevInput || "0";
    
    const currentNum = parseFloat(currentStr);
    const prevNum = parseFloat(prevStr);
    const usage = (currentNum - prevNum).toFixed(3);
    
    if (currentNum < prevNum && !confirm("⚠️ Current lower than previous. Save anyway?")) return;
    
    const data = { id: eq.id, name: eq.name, loc: eq.loc, curr: currentStr, prev: prevStr, usage: usage };
    this.state.sessionReadings[this.state.currentIndex] = data;
    localStorage.setItem('p_last_index', this.state.currentIndex + 1);
    if (this.state.isSingleEdit) {
        await db.ref(`readings/${this.state.filterDate}/${eq.id}`).set(data);
        this.state.isSingleEdit = false; this.state.view = 'records'; 
        await this.syncWithCloud(this.state.filterDate);
    } else if (this.state.isEditingFromReview) {
        this.state.isEditingFromReview = false; this.state.view = 'review'; this.render();
    } else {
        if (this.state.currentIndex < MOCK_EQUIPMENT.length - 1) { 
            this.state.currentIndex++; this.render(); 
        } else { 
            this.state.view = 'review'; this.render(); 
        }
    }
  }

  reviewHTML() {
  return `
  <div class="p-6 max-w-xl mx-auto flex flex-col min-h-screen">
    <h2 class="text-3xl font-black mb-6 italic pt-10">Review Log</h2>

    <div class="glass-card rounded-[2rem] flex-1 mb-8 overflow-y-auto">
      <table class="w-full">
        ${this.state.sessionReadings.map((r, i) => r ? 
          `<tr onclick="app.editFromReview(${i})" class="border-b border-white/5 cursor-pointer hover:bg-white/5">
            <td class="p-4 font-black uppercase text-[9px] opacity-70">${r.name}</td>

  // --- REST OF THE METHODS (confirmFinalSave, editFromDashboard, etc.) ---
 async confirmFinalSave() {
    // --- 1. SIGNAL GUARD ---
    // Haharangin muna natin dito bago pa man mag-proceed sa opName
    if (!navigator.onLine) {
        alert("⚠️ WALANG INTERNET!\n\nHindi mai-save ang data sa database. Maghanap ng signal o kumonekta sa Wi-Fi bago i-click ang Submit.");
        return; // Stop the process
    }

    const opName = document.getElementById('opNameInput').value.trim().toUpperCase();
    if(!opName) return alert("Enter Operator Name!");

    // --- 2. PREPARE RECENT OPERATORS ---
    let recent = JSON.parse(localStorage.getItem('recentOperators') || '[]'); 
    recent = [opName, ...recent.filter(n => n !== opName)].slice(0, 5); 
    localStorage.setItem('recentOperators', JSON.stringify(recent));

    // --- 3. PREPARE DATA ---
    const updates = {}; 
    this.state.sessionReadings.forEach(r => { if(r) updates[`/readings/${this.state.date}/${r.id}`] = r; });
    updates[`/readings/${this.state.date}/metadata`] = { operator: opName, timestamp: Date.now() };

    // --- 4. ACTUAL SAVING WITH ERROR HANDLING ---
    try {
        await db.ref().update(updates); 
        
        // Success! Dito na natin lilinisin ang modal at progress
        document.getElementById('nameModal').classList.add('hidden');
        this.state.view = 'records'; 
        this.state.filterDate = this.state.date; 
        
        await this.syncWithCloud(this.state.date);
        
        // Clear progress ONLY if successfully saved to cloud
        localStorage.removeItem('p_last_index');
        
        alert("✅ LOGSHEET SUBMITTED!");
    } catch (e) {
        // Kung nag-error (halimbawa biglang naputol ang net habang nag-u-update)
        alert("❌ PAG-SAVE FAILED: Check your signal and try again.\n" + e.message);
    }
}

  openNameModal() {
    const modal = document.getElementById('nameModal'); modal.classList.remove('hidden');
    const recent = JSON.parse(localStorage.getItem('recentOperators') || '[]');
    document.getElementById('recentNamesList').innerHTML = recent.map(name => `<button onclick="document.getElementById('opNameInput').value='${name}'; app.confirmFinalSave()" class="text-[9px] bg-emerald-500/10 text-current px-4 py-2 rounded-xl font-bold uppercase m-1 border border-emerald-500/20">${name}</button>`).join('');
  }

 async start() { 
    await this.syncWithCloud(); 
    this.state.isSingleEdit = false; 

    // Kunin ang huling index na tinigilan (kung meron)
    const savedIndex = localStorage.getItem('p_last_index');
    
    if (savedIndex && savedIndex < MOCK_EQUIPMENT.length) {
        const resume = confirm("Resume from where you left off?");
        if (resume) {
            this.state.currentIndex = parseInt(savedIndex);
        } else {
            this.state.currentIndex = 0;
            localStorage.removeItem('p_last_index'); // Clear kung ayaw mag-resume
        }
    } else {
        // Kung wala pang nasimulan, hanapin ang unang empty
        let firstEmpty = 0; 
        for(let i=0; i<MOCK_EQUIPMENT.length; i++) { 
            if(!this.state.cloudReadings[MOCK_EQUIPMENT[i].id]) { 
                firstEmpty = i; 
                break; 
            } 
        } 
        this.state.currentIndex = firstEmpty;
    }

    this.state.view = 'reading'; 
    this.render(); 
}
  exitReading() { if (this.state.isEditingFromReview) { this.state.isEditingFromReview = false; this.state.view = 'review'; } else { this.state.view = this.state.isSingleEdit ? 'records' : 'home'; } this.state.isSingleEdit = false; this.render(); }
  editFromReview(i) { this.state.currentIndex = i; this.state.isEditingFromReview = true; this.state.view = 'reading'; this.render(); }
  editFromDashboard(id) { const pin = prompt("Admin PIN:"); if (pin === "abnpower") { const index = MOCK_EQUIPMENT.findIndex(e => e.id === id); if (index !== -1) { this.state.isSingleEdit = true; this.state.currentIndex = index; this.state.view = 'reading'; this.render(); } } }
  exportToExcel() {
    let csv = "ID,Equipment,Location,Previous,Current,Usage\n";
    MOCK_EQUIPMENT.forEach(eq => { const r = this.state.cloudReadings[eq.id] || { prev: '0', curr: '0', usage: '0' }; csv += `${eq.id},"${eq.name}",${eq.loc},${r.prev},${r.curr},${r.usage}\n`; });
    const blob = new Blob([csv], { type: 'text/csv' }); const link = document.createElement("a"); link.href = URL.createObjectURL(blob); link.download = `Log_${this.state.filterDate}.csv`; link.click();
  }
}

// UTILS & WINDOW FUNCTIONS
window.handleKey = (k) => { 
    const c = document.getElementById('c'); 
    const p = document.getElementById('p'); 
    if(!c || !p) return;

    // 1. KEYPAD LOGIC (PAG-TYPE)
    if (k === '⌫') {
        c.value = c.value.slice(0, -1);
    } else if (k === '.') {
        if (!c.value.includes('.')) c.value += '.';
    } else { 
        // Limit to 4 decimal places para hindi mag-overflow sa screen
        if (c.value.includes('.') && c.value.split('.')[1].length >= 4) return; 
        c.value += k; 
    }

    // 2. ERROR DETECTION LOGIC
    const currentVal = parseFloat(c.value) || 0;
    const prevVal = parseFloat(p.value) || 0;

    // 3. DIRECT COLOR FEEDBACK (Mismong Numero)
    if (c.value === "") {
        c.style.color = ""; // Neutral kapag walang tinatype
    } else if (currentVal < prevVal) {
        // ERROR: Mas mababa sa previous reading (RED)
        c.style.color = "#ef4444"; 
    } else if (currentVal > prevVal + 2000000) { 
        // TYPO: Sobrang laki ng jump (ORANGE) 
        // Pwede mong i-adjust ang 2M base sa max consumption niyo
        c.style.color = "#f59e0b";
    } else {
        // CORRECT: Normal increase (GREEN)
        c.style.color = "#10b981"; 
    }
};
window.enterNext = () => { 
    const c = document.getElementById('c'); 
    const p = document.getElementById('p'); 
    if(!c || (c.value === "" && !app.state.isSingleEdit)) return; 
    app.saveReading(c.value, p.value); 
};

window.toggleSettings = () => document.getElementById('settingsModal').classList.toggle('hidden');
window.updateOpacity = (v) => { document.documentElement.style.setProperty('--glass-opacity', v); localStorage.setItem('p_op', v); };
window.setBg = (val, mode) => { 
    const b = document.getElementById('bodyBg');
    
    // 1. Reset everything first
    b.style.backgroundImage = 'none';
    b.style.backgroundColor = 'transparent';
    
    // 2. Apply New Theme
    if (val.startsWith('#')) {
        b.style.backgroundColor = val;
    } else {
        b.style.backgroundImage = `url('${val}')`;
        b.style.backgroundSize = 'cover';
        b.style.backgroundPosition = 'center';
    }

    // 3. Update Mode (Light/Dark)
    b.classList.remove('light-mode', 'dark-mode');
    b.classList.add(mode + '-mode');

    // 4. Save to LocalStorage
    localStorage.setItem('p_theme_val', val);
    localStorage.setItem('p_theme_mode', mode);
};
window.handleImageUpload = (e) => { const r = new FileReader(); r.onload = (ev) => setBg(`url(${ev.target.result})`, 'dark'); r.readAsDataURL(e.target.files[0]); };
function loadSavedTheme() {
    const val = localStorage.getItem('p_theme_val') || 'assets/bg.webp';
    const mode = localStorage.getItem('p_theme_mode') || 'light';
    const op = localStorage.getItem('p_opacity') || '0.80';
    
    window.setBg(val, mode);
    window.updateOpacity(op);
}
window.startPress = () => { isLongPress = false; pressTimer = setTimeout(() => { isLongPress = true; const display = document.getElementById('c'); if(display) display.value = ""; if(navigator.vibrate) navigator.vibrate(50); }, 600); };
window.endPress = (k) => { clearTimeout(pressTimer); if(!isLongPress) { handleKey(k); } };
window.restoreDefaults = () => {
    if (confirm("Reset UI to default settings?")) {
        // 1. Burahin ang mga saved settings sa browser
        localStorage.removeItem('p_bg');
        localStorage.removeItem('p_mode');
        localStorage.removeItem('p_op');
        
        // 2. I-reset ang glass opacity slider value (kung gusto mo)
        const slider = document.querySelector('input[type="range"]');
        if(slider) slider.value = 0.80;
        
        // 3. Patakbuhin ulit ang default loader
        loadSavedTheme();
        
        // 4. Isara ang modal para makita ang pagbabago
        toggleSettings();
        
        // 5. Optional: Mag-vibrate o mag-alert
        if(navigator.vibrate) navigator.vibrate(100);
    }
};
// Live Signal Monitor for PowerCon
setInterval(() => {
    const status = document.getElementById('signalStatus');
    if(!status) return;

    if(navigator.onLine) {
        status.innerText = "● ONLINE: READY TO SUBMIT";
        status.style.color = "#10b981"; // Emerald Green
        status.style.opacity = "1";
    } else {
        status.innerText = "● OFFLINE: FIND BETTER SIGNAL";
        status.style.color = "#ef4444"; // Red
        status.style.opacity = "1";
    }
}, 2000);
const app = new PowerCon();
